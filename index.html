<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda Institucional</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<div class="background"></div>

<header>
<div id="barraEvento">
        <span id="textoBarra">Nenhum evento programado.</span>
    </div>

<div class="logo-area">
        <div class="logo">
            <img src="logo.png" alt="Logo DRE Cáceres">
        </div>
        <div>
            <h1>DRE CÁCERES - COPED</h1>
            <p>Agenda Institucional</p>
        </div>
    </div>
</header>



   
  


<main>

<section class="dashboard">

<div class="stat-card stat-card-lg">
<div class="stat-left">
<span class="stat-label">Eventos</span>
</div>
<span class="stat-value stat-value-lg" id="totalEventos">0</span>
</div>


<div class="stat-card stat-card-lg">
<div class="stat-left">
<span class="stat-label">Hoje</span>
</div>
<span class="stat-value stat-value-lg" id="eventosHoje">0</span>
</div>

<a href="https://docs.google.com/spreadsheets/d/1XQ6_Qv-6bJEQRmN0HyV5X4o3v_WMGuGm1PFmLfLrx0o/edit?usp=sharing" target="_blank" class="stat-card-link">

<div class="stat-card stat-card-lg card-gradient">
                <div class="stat-left">
                    <span class="stat-label2">Dados<br>Escolares</span>
                </div>
            </div>

</a>



<div class="dashboard-actions">

<button id="btnAdicionarLinha" class="btn-novo-evento">

➕ Novo Evento

</button>

<button id="btnBaixarExcel" class="btn-baixar-excel">

⬇️ Baixar em Excel

</button>

</div>
<div class="dashboard-actions">
            <button id="btnRemoverLinha" class="btn-novo-evento">
                ➖ Excluir Evento
            </button>
            <button id="btnImportarExcel" class="btn-novo-evento" style="background: #0288d1;">
                📤 Importar Excel
            </button>
            <input type="file" id="inputImportarExcel" accept=".xlsx,.xls,.csv" style="display:none;">
        </div>
    </section>


<section class="table-container">

<table id="agenda">

<thead>

<tr>

<th width="7%">Início</th>

<th width="7%">Fim</th>

<th width="8%">Horário</th>

<th style="display:none;">Aviso</th>

<th width="12%">Período</th>

<th> Ações</th>

<th width="22%">Responsável</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

<div class="pagination-dots" id="paginationDots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

</section>


</main>

<div id="alertaEvento" class="alerta">

<div class="alerta-box">

<h1>

🔔 Próximo Evento

</h1>

<h2 id="tituloEvento"></h2>

<p id="horaEvento"></p>

<div id="contadorEvento"></div>

</div>

</div>

<footer>

<div class="ticker">

<div id="avisos">

📢 Bem-vindos à Agenda Institucional da DRE Cáceres.

</div>

</div>

</footer>


<template id="linha">

<tr>

<td contenteditable="true"></td>

<td contenteditable="true"></td>

<td contenteditable="true"></td>

<td contenteditable="true" style="display:none;">15</td>

<td contenteditable="true"></td>

<td contenteditable="true"></td>

<td contenteditable="true"></td>

</tr>

</template>

<script type="module" src="app.js"></script>

</body>

</html>
